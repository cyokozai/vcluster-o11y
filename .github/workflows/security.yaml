name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 9 * * 1" # 毎週月曜 09:00 UTC

jobs:
  trivy-terraform:
    name: Trivy (Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (Terraform)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: config
          scan-ref: terraform/
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivyignores: terraform/.trivyignore

  trivy-manifests:
    name: Trivy (Kubernetes Manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (manifests)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: config
          scan-ref: manifests/
          exit-code: "1"
          severity: HIGH,CRITICAL

  trivy-helm:
    name: Trivy (Helm values)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (helm)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: config
          scan-ref: helm/
          exit-code: "1"
          severity: HIGH,CRITICAL
