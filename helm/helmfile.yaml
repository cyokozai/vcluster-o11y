# Deployment of vCluster and Observability Stack on the Dev Environment

repositories:
  - name: loft
    url: https://charts.loft.sh

  - name: grafana
    url: https://grafana.github.io/helm-charts

  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

  - name: cilium
    url: https://helm.cilium.io/

---

environments:
  dev:
    kubeContext: ${DEV_KUBE_CONTEXT}

---

releases:
  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: "1.18.4"
    values:
      - eni:
          enabled: true # ENI mode (Native Routing) 
      - ipam:
          mode: eni
      - egressMasqueradeInterfaces: eth0
      - routingMode: native
      - hubble:
          relay:
            enabled: true
          ui:
            enabled: true
          metrics:
            enabled:
              - dns:query;ignoreAAAA
              - drop
              - tcp
              - flow
              - port-distribution
              - icmp
              - http
            serviceMonitor:
              enabled: true
              trustCRDsExist: true
      - prometheus:
          enabled: true
          serviceMonitor:
            enabled: true

  - name: vcluster
    namespace: vcluster-system
    chart: loft/vcluster
    version: "0.30.3"
    createNamespace: true
    timeout: 1800
    values:
    - sync:
        fromHost:
          nodes:
            enabled: true
          priorityClasses:
            enabled: true
          ingressClasses:
            enabled: true
          storageClasses:
            enabled: true
        toHost:
          ingresses:
            enabled: true
          services:
            enabled: true
      controlPlane:
        backingStore:
          etcd:
            deploy:
              enabled: true
              statefulSet:
                persistence:
                  volumeClaim:
                    enabled: true
                    size: 5Gi
                    storageClass: gp3
        statefulSet:
          persistence:
            volumeClaim:
              enabled: true
              size: 10Gi
              storageClass: gp3
          scheduling:
            podManagementPolicy: Parallel
      deploy:
        metricsServer:
          enabled: false
      policies:
        podSecurityStandard: "baseline"
        networkPolicy:
          enabled: true
        resourceQuota:
          enabled: true
          quota:
            requests.cpu: "4"
            requests.memory: "16Gi"
            limits.cpu: "8"
            limits.memory: "32Gi"
      integrations:
        metricsServer:
          enabled: false
          nodes: true
          pods: true

  - name: tempo
    namespace: monitoring
    chart: grafana/tempo
    version: "1.24.1"
    values:
    - persistence:
        enabled: true
        size: 10Gi
        storageClass: gp3
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
          wal:
            path: /var/tempo/wal

  - name: alloy
    namespace: monitoring
    chart: grafana/alloy
    version: "0.5.0"
    values:
    - alloy:
        configMap:
          create: true
          content: |
            // Receiver for OTLP (both gRPC and HTTP)
            otelcol.receiver.otlp "default" {
              grpc { endpoint = "0.0.0.0:4317" }
              http { endpoint = "0.0.0.0:4318" }
              output {
                metrics = [prometheus.remote_write.default.receiver]
                traces  = [otelcol.exporter.otlp.tempo.input]
              }
            }
            // Exporter to Tempo (Trace)
            otelcol.exporter.otlp "tempo" {
              client {
                endpoint = "tempo.monitoring.svc.cluster.local:4317"
                tls {
                  insecure = true
                }
              }
            }
            // Exporter to Prometheus Remote Write (Metric)
            prometheus.remote_write "default" {
              endpoint {
                url = "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
              }
            }

  - name: kube-prometheus-stack
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: "80.2.0"
    createNamespace: true
    values:
    - grafana:
        additionalDataSources:
          - name: Tempo
            type: tempo
            uid: tempo
            url: http://tempo.monitoring.svc.cluster.local:3100
            access: proxy
            jsonData:
              tracesToLogs:
                datasourceUid: 'prometheus'
              nodeGraph:
                enabled: true
    - prometheusOperator:
        admissionWebhooks:
          enabled: false
        tls:
          enabled: false
      persistentVolumes:
        enabled: true
      persistentVolumeClaims:
        enabled: true
      prometheusSpec:
        scrapeInterval: "15s"
        evaluationInterval: "15s"
        enableFeatures:
          - remote-write-receiver
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
      additionalScrapeConfigs:
      - job_name: 'prometheus'
        static_configs:
        - targets: ['localhost:9090']
      - job_name: kube-etcd
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file:   /etc/prometheus/secrets/etcd-client-cert/etcd-ca
          cert_file: /etc/prometheus/secrets/etcd-client-cert/etcd-client
          key_file:  /etc/prometheus/secrets/etcd-client-cert/etcd-client-key
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - source_labels: [__address__]
          action: replace
          target_label: __address__
          regex: ([^:;]+):(\d+)
          replacement: ${1}:2379
        - source_labels: [__meta_kubernetes_node_name]
          action: keep
          regex: .*mst.*
        - source_labels: [__meta_kubernetes_node_name]
          action: replace
          target_label: node
          regex: (.*)
          replacement: ${1}
        metric_relabel_configs:
        - regex: (kubernetes_io_hostname|failure_domain_beta_kubernetes_io_region|beta_kubernetes_io_os|beta_kubernetes_io_arch|beta_kubernetes_io_instance_type|failure_domain_beta_kubernetes_io_zone)
          action: labeldrop
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: job