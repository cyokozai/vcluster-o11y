# Deployment of vCluster and Observability Stack on the Dev Environment

repositories:
  - name: loft
    url: https://charts.loft.sh

  - name: grafana
    url: https://grafana.github.io/helm-charts

  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

---

environments:
  dev:
    kubeContext: ${DEV_KUBE_CONTEXT}

---

releases:
  - name: vcluster
    namespace: vcluster-system
    chart: loft/vcluster
    version: "0.30.4"
    createNamespace: true
    timeout: 1800
    values:
      - sync:
          fromHost:
            nodes:
              enabled: true
            priorityClasses:
              enabled: true
            ingressClasses:
              enabled: true
            storageClasses:
              enabled: true
          toHost:
            ingresses:
              enabled: true
            services:
              enabled: true
        controlPlane:
          backingStore:
            etcd:
              deploy:
                enabled: true
                statefulSet:
                  persistence:
                    volumeClaim:
                      enabled: true
                      size: 5Gi
                      storageClass: gp3
          statefulSet:
            persistence:
              volumeClaim:
                enabled: true
                size: 10Gi
                storageClass: gp3
            scheduling:
              podManagementPolicy: Parallel
        deploy:
          metricsServer:
            enabled: false
        policies:
          podSecurityStandard: "baseline"
          networkPolicy:
            enabled: true
          resourceQuota:
            enabled: true
            quota:
              requests.cpu: "2"
              requests.memory: "8Gi"
              limits.cpu: "4"
              limits.memory: "24Gi"
        integrations:
          metricsServer:
            enabled: false
            nodes: true
            pods: true
        networking:
          replicateServices:
            fromHost:
              - from: monitoring/alloy
                to: otel-demo/otelcol-to-alloy

  - name: tempo
    namespace: monitoring
    chart: grafana/tempo
    version: "1.24.3"
    values:
      - persistence:
          enabled: true
          size: 10Gi
          storageClass: gp3
        tempo:
          metricsGenerator:
            enabled: true
            remoteWriteUrl: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
            processor:
              service_graphs:
                wait: 10s
                max_items: 10000
              span_metrics:
                enable_target_info: true
            storage:
              path: "/var/tempo/metrics"
            traces_storage:
              path: "/var/tempo/wal"
          overrides:
            defaults:
              metrics_generator:
                processors:
                  - service-graphs
                  - span-metrics
                max_active_series: 10000

  - name: loki
    namespace: monitoring
    chart: grafana/loki
    version: "6.52.0"
    values:
      - deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            path_prefix: /var/loki
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          storage:
            type: filesystem
          limits_config:
            reject_old_samples: true
            reject_old_samples_max_age: 168h
            volume_enabled: true
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 10Gi
            storageClass: gp3
        gateway:
          enabled: false
        lokiCanary:
          enabled: false
        test:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

  - name: alloy
    namespace: monitoring
    chart: grafana/alloy
    version: "0.5.0"
    values:
      - alloy:
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP
          configMap:
            create: true
            content: |
              // OTLP Receiver (gRPC and HTTP)
              otelcol.receiver.otlp "default" {
                grpc {
                  endpoint = "0.0.0.0:4317"
                }
                http {
                  endpoint = "0.0.0.0:4318"
                }
                output {
                  metrics = [otelcol.processor.batch.default.input]
                  traces  = [otelcol.processor.batch.default.input]
                  logs    = [otelcol.processor.batch.default.input]
                }
              }

              // Batch Processor (optional but recommended)
              otelcol.processor.batch "default" {
                output {
                  metrics = [otelcol.exporter.prometheus.default.input]
                  traces  = [otelcol.exporter.otlp.tempo.input]
                  logs    = [otelcol.exporter.loki.default.input]
                }
              }
              // Exporter: Loki (Logs)
              otelcol.exporter.loki "default" {
                forward_to = [loki.write.default.receiver]
              }
              loki.write "default" {
                endpoint {
                  url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
                }
              }
              // Exporter: OTLP to Tempo (Traces)
              otelcol.exporter.otlp "tempo" {
                client {
                  endpoint = "tempo.monitoring.svc.cluster.local:4317"
                  tls {
                    insecure = true
                  }
                }
              }
              // Exporter: Prometheus Remote Write (Metrics)
              otelcol.exporter.prometheus "default" {
                forward_to = [prometheus.remote_write.default.receiver]
              }

              prometheus.remote_write "default" {
                endpoint {
                  url = "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
                }
              }

  - name: kube-prometheus-stack
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: "80.2.0"
    createNamespace: true
    values:
      # Grafana 設定
      - grafana:
          additionalDataSources:
            - name: Tempo
              type: tempo
              uid: tempo
              url: http://tempo.monitoring:3200
              access: proxy
              jsonData:
                tracesToLogs:
                  datasourceUid: 'loki'
                nodeGraph:
                  enabled: true
                serviceMap:
                  datasourceUid: 'prometheus'
            - name: Loki
              type: loki
              uid: loki
              url: http://loki.monitoring:3100
              access: proxy
              jsonData:
                derivedFields:
                  - datasourceUid: tempo
                    matcherRegex: '"traceID":"(\w+)"'
                    name: TraceID
                    url: '$${__value.raw}'
          serviceMonitor:
            enabled: true
            interval: 30s
            scrapeTimeout: 20s

      # Grafana アラートルール プロビジョニング
      - grafana:
          alerting:
            "alert-rules.yaml":
              apiVersion: 1
              groups:
                - orgId: 1
                  name: infrastructure
                  folder: OTEL Demo Alerts
                  interval: 5m
                  rules:
                    - uid: dfeao8wei51c0c
                      title: StorageNearFull
                      condition: Threshold
                      data:
                        - refId: Storage Near Full
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            editorMode: code
                            expr: |-
                              kubelet_volume_stats_used_bytes{namespace="monitoring"}
                              /
                              kubelet_volume_stats_capacity_bytes{namespace="monitoring"}
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: Storage Near Full
                        - refId: Threshold
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 0.85
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params:
                                    - C
                                reducer:
                                  params: []
                                  type: last
                                type: query
                            datasource:
                              type: __expr__
                              uid: __expr__
                            expression: Storage Near Full
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Threshold
                            type: threshold
                      noDataState: NoData
                      execErrState: Error
                      for: 10m
                      annotations:
                        description: 'PVC の使用率が 85% を超えています。現在値: {{ index $values "Storage Near Full" }}'
                        summary: PVC のストレージが残り少なくなっています
                      labels:
                        severity: warning
                        team: platform
                      isPaused: false
                      notification_settings:
                        receiver: grafana-default-email
                    - uid: cfeaow5kmjjlsc
                      title: vClusterQuotaExhaustion
                      condition: Threshold
                      data:
                        - refId: Usage ratio
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            datasource:
                              type: prometheus
                              uid: prometheus
                            editorMode: code
                            expr: |-
                              kube_resourcequota{namespace="vcluster-otel-demo", type="used"}
                              / ignoring(type)
                              kube_resourcequota{namespace="vcluster-otel-demo", type="hard"}
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: Usage ratio
                        - refId: Threshold
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 0.8
                                    - 0
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params: []
                                reducer:
                                  params: []
                                  type: avg
                                type: query
                            datasource:
                              name: Expression
                              type: __expr__
                              uid: __expr__
                            expression: Usage ratio
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Threshold
                            type: threshold
                      noDataState: NoData
                      execErrState: Error
                      for: 10m
                      annotations:
                        description: 'vCluster (vcluster-otel-demo) の ResourceQuota {{ $labels.resource }} の使用率が 80% を超えています。現在値: {{ index $values "Usage ratio" }}'
                        summary: vCluster の ResourceQuota 使用率が 80% を超過
                      labels:
                        severity: warning
                        team: platform
                      isPaused: false
                      notification_settings:
                        receiver: grafana-default-email
                - orgId: 1
                  name: pipeline
                  folder: OTEL Demo Alerts
                  interval: 1m
                  rules:
                    - uid: efeanyit1cpa8b
                      title: TelemetryPipelineDrop
                      condition: Threshold
                      data:
                        - refId: TelemetryPipelineDrop
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            editorMode: code
                            expr: |-
                              sum(rate(otelcol_exporter_send_failed_spans_total[5m]))
                              +
                              sum(rate(otelcol_exporter_send_failed_log_records_total[5m]))
                              +
                              sum(rate(otelcol_exporter_send_failed_metric_points_total[5m]))
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: TelemetryPipelineDrop
                        - refId: Threshold
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 0
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params:
                                    - C
                                reducer:
                                  params: []
                                  type: last
                                type: query
                            datasource:
                              type: __expr__
                              uid: __expr__
                            expression: TelemetryPipelineDrop
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Threshold
                            type: threshold
                      noDataState: NoData
                      execErrState: Error
                      for: 3m
                      annotations:
                        description: 'OTel Collector でのデータ送信失敗が検出されました。送信失敗レート: {{ index $values "TelemetryPipelineDrop" }}/s'
                        summary: テレメトリパイプラインでデータドロップが発生
                      labels:
                        severity: warning
                        team: platform
                      isPaused: false
                      notification_settings:
                        receiver: grafana-default-email
                - orgId: 1
                  name: service-health
                  folder: OTEL Demo Alerts
                  interval: 5m
                  rules:
                    - uid: cfe7nq781h43kd
                      title: HighErrorRate
                      condition: Threshold
                      data:
                        - refId: Total requests
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            editorMode: code
                            expr: |-
                              sum by (service_name) (
                                rate(traces_span_metrics_calls_total{span_kind="SPAN_KIND_SERVER"}[5m])
                              )
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: Total requests
                        - refId: Error requests
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            datasource:
                              type: prometheus
                              uid: prometheus
                            editorMode: code
                            expr: |-
                              sum by (service_name) (
                                rate(traces_span_metrics_calls_total{
                                  span_kind="SPAN_KIND_SERVER",
                                  status_code="STATUS_CODE_ERROR"
                                }[5m])
                              )
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: Error requests
                        - refId: Error Rate
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 0
                                    - 0
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params: []
                                reducer:
                                  params: []
                                  type: avg
                                type: query
                            datasource:
                              name: Expression
                              type: __expr__
                              uid: __expr__
                            expression: (${Error requests} / ${Total requests}) * 100
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Error Rate
                            type: math
                        - refId: Threshold
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 5
                                    - 0
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params: []
                                reducer:
                                  params: []
                                  type: avg
                                type: query
                            datasource:
                              name: Expression
                              type: __expr__
                              uid: __expr__
                            expression: Error Rate
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Threshold
                            type: threshold
                      noDataState: NoData
                      execErrState: Error
                      for: 5m
                      annotations:
                        description: 'サービス {{ $labels.service_name }} のエラーレートが閾値 5% を超えています。現在値: {{ index $values "Error Rate" }}%'
                        summary: '{{ $labels.service_name }} のエラーレートが {{ index $values "Error Rate" }}% を超過'
                      labels:
                        severity: critical
                        team: platform
                      isPaused: false
                      notification_settings:
                        receiver: grafana-default-email
                    - uid: afeamdyr3vchsf
                      title: HighLatencyP99
                      condition: Threshold
                      data:
                        - refId: HighLatencyP99
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            editorMode: code
                            expr: |
                              histogram_quantile(0.99,
                                sum by (service_name, le) (
                                  rate(traces_span_metrics_duration_milliseconds_bucket{
                                    span_kind="SPAN_KIND_SERVER",
                                    service_name!~"flagd|image-provider"
                                  }[5m])
                                )
                              )
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: HighLatencyP99
                        - refId: Threshold
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 2000
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params:
                                    - C
                                reducer:
                                  params: []
                                  type: last
                                type: query
                                unloadEvaluator:
                                  params:
                                    - 2000
                                  type: lt
                            datasource:
                              type: __expr__
                              uid: __expr__
                            expression: HighLatencyP99
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Threshold
                            type: threshold
                      noDataState: NoData
                      execErrState: Error
                      for: 5m
                      annotations:
                        description: 'サービス {{ $labels.service_name }} の P99 レイテンシが閾値 2000ms を超えています。現在値: {{ index $values "HighLatencyP99" }}ms'
                        summary: '{{ $labels.service_name }} の P99 レイテンシが 2s を超過'
                      labels:
                        severity: warning
                        team: platform
                      isPaused: false
                      notification_settings:
                        receiver: grafana-default-email
                    - uid: ffean7ocv4u0wc
                      title: ServiceDown
                      condition: Threshold
                      data:
                        - refId: ServiceDown
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            editorMode: code
                            expr: |
                              sum by (service_name) (
                                rate(traces_span_metrics_calls_total{
                                  span_kind="SPAN_KIND_SERVER",
                                  status_code!="STATUS_CODE_ERROR",
                                  service_name!="image-provider"
                                }[3m])
                              )
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: ServiceDown
                        - refId: Threshold
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 0.001
                                  type: lt
                                operator:
                                  type: and
                                query:
                                  params:
                                    - C
                                reducer:
                                  params: []
                                  type: last
                                type: query
                            datasource:
                              type: __expr__
                              uid: __expr__
                            expression: ServiceDown
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Threshold
                            type: threshold
                      noDataState: NoData
                      execErrState: Error
                      for: 5m
                      annotations:
                        description: サービス {{ $labels.service_name }} の直近 3 分間の成功リクエストレートがほぼ 0 です
                        summary: '{{ $labels.service_name }} がダウンしている可能性'
                      labels:
                        severity: critical
                        team: platform
                      isPaused: false
                      notification_settings:
                        receiver: grafana-default-email
                    - uid: afeanp3qejmrke
                      title: PodOOMKillRisk
                      condition: Threshold
                      data:
                        - refId: Memory usage
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            editorMode: code
                            expr: |-
                              sum by (pod) (
                                container_memory_working_set_bytes{
                                  namespace="vcluster-otel-demo",
                                  container!="",
                                  container!="POD"
                                }
                              )
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: Memory usage
                        - refId: Memory limit
                          relativeTimeRange:
                            from: 600
                            to: 0
                          datasourceUid: prometheus
                          model:
                            datasource:
                              type: prometheus
                              uid: prometheus
                            editorMode: code
                            expr: |-
                              sum by (pod) (
                                kube_pod_container_resource_limits{
                                  namespace="vcluster-otel-demo",
                                  resource="memory"
                                }
                              )
                            instant: true
                            intervalMs: 1000
                            legendFormat: __auto
                            maxDataPoints: 43200
                            range: false
                            refId: Memory limit
                        - refId: Usage ratio = A / B
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 0
                                    - 0
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params: []
                                reducer:
                                  params: []
                                  type: avg
                                type: query
                            datasource:
                              name: Expression
                              type: __expr__
                              uid: __expr__
                            expression: ${Memory usage} / ${Memory limit}
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Usage ratio = A / B
                            type: math
                        - refId: Threshold
                          datasourceUid: __expr__
                          model:
                            conditions:
                              - evaluator:
                                  params:
                                    - 0.9
                                    - 0
                                  type: gt
                                operator:
                                  type: and
                                query:
                                  params: []
                                reducer:
                                  params: []
                                  type: avg
                                type: query
                            datasource:
                              name: Expression
                              type: __expr__
                              uid: __expr__
                            expression: Usage ratio = A / B
                            intervalMs: 1000
                            maxDataPoints: 43200
                            refId: Threshold
                            type: threshold
                      noDataState: NoData
                      execErrState: Error
                      for: 5m
                      annotations:
                        description: 'Pod {{ $labels.pod }} のメモリ使用率が limit の 90% を超えています。現在値: {{ index $values "Usage ratio = A / B" }}'
                        summary: Pod {{ $labels.pod }} が OOM Kill のリスク
                      labels:
                        severity: warning
                        team: platform
                      isPaused: false
                      notification_settings:
                        receiver: grafana-default-email

      # Prometheus Operator 設定
      - prometheusOperator:
          enabled: true
          admissionWebhooks:
            enabled: false
          tls:
            enabled: false
          rbac:
            create: true
          serviceAccount:
            create: true
            name: kube-prometheus-stack-operator
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet

      # Prometheus 本体の設定
      - prometheus:
          enabled: true
          prometheusSpec:
            scrapeInterval: "15s"
            evaluationInterval: "15s"
            enableRemoteWriteReceiver: true
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            additionalScrapeConfigs:
              - job_name: 'prometheus'
                static_configs:
                  - targets: ['localhost:9090']
              - job_name: kube-etcd
                kubernetes_sd_configs:
                  - role: node
                scheme: https
                tls_config:
                  ca_file: /etc/prometheus/secrets/etcd-client-cert/etcd-ca
                  cert_file: /etc/prometheus/secrets/etcd-client-cert/etcd-client
                  key_file: /etc/prometheus/secrets/etcd-client-cert/etcd-client-key
                relabel_configs:
                  - action: labelmap
                    regex: __meta_kubernetes_node_label_(.+)
                  - source_labels: [__address__]
                    action: replace
                    target_label: __address__
                    regex: ([^:;]+):(\d+)
                    replacement: ${1}:2379
                  - source_labels: [__meta_kubernetes_node_name]
                    action: keep
                    regex: .*mst.*
                  - source_labels: [__meta_kubernetes_node_name]
                    action: replace
                    target_label: node
                    regex: (.*)
                    replacement: ${1}
                metric_relabel_configs:
                  - regex: (kubernetes_io_hostname|failure_domain_beta_kubernetes_io_region|beta_kubernetes_io_os|beta_kubernetes_io_arch|beta_kubernetes_io_instance_type|failure_domain_beta_kubernetes_io_zone)
                    action: labeldrop
              - job_name: 'kubernetes-pods'
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                    action: replace
                    target_label: __metrics_path__
                    regex: (.+)
                  - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                    action: replace
                    regex: ([^:]+)(?::\d+)?;(\d+)
                    replacement: $1:$2
                    target_label: __address__
                  - source_labels: [__meta_kubernetes_namespace]
                    action: replace
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    action: replace
                    target_label: job
