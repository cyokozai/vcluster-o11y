controlPlane:
  distro:
    k3s:
      enabled: true
      image:
        tag: v1.31.4-k3s1

  service:
    enabled: true
    spec:
      type: ClusterIP

  backingStore:
    etcd:
      deploy:
        enabled: false

  statefulSet:
    # vCluster コントロールプレーンの永続化
    persistence:
      volumeClaim:
        enabled: true
        size: 50Gi
        storageClass: gp3
    # リソース制限
    resources:
      limits:
        cpu: "8"
        memory: "8Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    pods:
      annotations: {
        "prometheus.io/scrape": "true",
        "prometheus.io/port": "8443",
        "prometheus.io/path": "/metrics"
      }

sync:
  # 仮想クラスタからホストへのリソース同期
  toHost:
    services:
      enabled: true

    ingresses:
      enabled: false

    persistentVolumeClaims:
      enabled: true

  # ホストから仮想クラスタへのリソース同期
  fromHost:
    nodes:
      enabled: true
      selector:
        all: true

    ingressClasses:
      enabled: false

    storageClasses:
      enabled: true

    # CSI ドライバー
    csiDrivers:
      enabled: true
    csiNodes:
      enabled: true
    csiStorageCapacities:
      enabled: true

# ネットワーク設定
networking:
  replicateServices:
    fromHost:
      - from: monitoring/alloy
        to: otel-demo/otelcol-to-alloy

# セキュリティとネットワークポリシー
policies:
  networkPolicy:
    enabled: false

  podSecurityStandard: baseline

  # vCluster 全体のリソース上限
  # OTel Demo (20+ サービス) + vCluster コントロールプレーンの合計使用量を実測し設定。
  # requests.cpu/memory: 実際の要求量の合計に余裕を持たせた値。
  # limits.cpu/memory: スパイク時のバースト上限。vClusterQuotaExhaustion アラート (>80%) の
  #   発火を意図的に発生させないよう、通常負荷の約 2 倍を確保している。
  # count/services: 50 は OTel Demo の全 Service 数 (~30) に対して余裕を持たせた値。
  # count/endpoints: 60 は 1 Service あたり複数 EndpointSlice が生成されるケースを考慮した値。
  # count/pods: 50 は OTel Demo の全 Pod 数 (~30) に余裕を持たせた値。
  resourceQuota:
    enabled: true
    quota:
      requests.cpu: "8"
      requests.memory: "16Gi"
      limits.cpu: "96"
      limits.memory: "64Gi"
      count/pods: "50"
      count/services: "50"
      count/endpoints: "60"
      persistentvolumeclaims: "10"

  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"

# メトリクス
integrations:
  metricsServer:
    enabled: false

# テレメトリ
telemetry:
  enabled: false
