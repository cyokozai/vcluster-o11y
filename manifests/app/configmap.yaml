---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: demo
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;

      location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
      }

      location /stub_status {
        stub_status on;
        access_log on;
        allow 127.0.0.1;
        deny all;
      }
    }