# Pattern B: Go API Server (Beyla eBPF 自動計装)
# kubectl apply -f manifests/pattern-b/deploy.yaml
#
# OTel SDK 除去に伴い、OTEL_* 環境変数も不要となった。
# トレース・メトリクスは Beyla DaemonSet (ホストクラスタ) が収集し Alloy へ送信する。
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api-server
      pattern: "b"
  template:
    metadata:
      labels:
        app: go-api-server
        pattern: "b"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: go-api-server
          image: ghcr.io/cyokozai/go-api-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: go-api-server
  namespace: default
spec:
  selector:
    app: go-api-server
    pattern: "b"
  ports:
    - port: 8080
      targetPort: 8080
